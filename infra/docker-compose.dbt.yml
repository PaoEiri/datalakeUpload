services:
  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dbt
    profiles: ["dbt"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBT_HOST: ${POSTGRES_HOST}
      DBT_PORT: ${POSTGRES_PORT}
      DBT_USER: ${POSTGRES_USER}
      DBT_PASSWORD: ${POSTGRES_PASSWORD}
      DBT_DATABASE: ${POSTGRES_DB}
      DBT_SCHEMA: staging
    volumes:
      - ../dbt:/dbt
    working_dir: /dbt
    command: ["tail", "-f", "/dev/null"]

  dbt-docs:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    container_name: dbt-docs
    profiles: ["dbt"]
    depends_on:
      - dbt
    environment:
      DBT_HOST: ${POSTGRES_HOST}
      DBT_PORT: ${POSTGRES_PORT}
      DBT_USER: ${POSTGRES_USER}
      DBT_PASSWORD: ${POSTGRES_PASSWORD}
      DBT_DATABASE: ${POSTGRES_DB}
      DBT_SCHEMA: staging
    volumes:
      - ../dbt:/dbt
    working_dir: /dbt
    ports:
      - "8080:8080"
    command: >
      bash -c "dbt docs generate && dbt docs serve --host 0.0.0.0 --port 8080"